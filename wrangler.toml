name = "thurmons-heat-air"
pages_build_output_dir = "out"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "thurmons-heat-air-db"
database_id = "e4327a42-4db5-4a95-8db3-8babb1239617"

# R2 Bucket Binding
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "thurmons-heat-air-assets"

# -----------------------------------------------------------------------
# Secrets are NOT stored here. Set them in the Cloudflare Pages dashboard
# (thurmons-heat-air -> Settings -> Variables and secrets, type = Secret):
#   SESSION_SECRET                 random 32+ char string
#   JWT_SECRET                     random 32+ char string
#   RESEND_API_KEY                 re_...    (transactional email)
#   NOTIFICATION_EMAIL             where new leads are sent
#   SQUARE_ACCESS_TOKEN            Square production (or sandbox) access token
#   SQUARE_LOCATION_ID             Square location id
#   SQUARE_WEBHOOK_SIGNATURE_KEY   from the Square webhook subscription
#   SQUARE_ENVIRONMENT             "production" or "sandbox"
# -----------------------------------------------------------------------
[vars]
ENVIRONMENT = "production"

# KV Namespace Bindings
[[kv_namespaces]]
binding = "SESSIONS"
id = "a2b0e99738c8433da46d97e2838fa0c3"

[[kv_namespaces]]
binding = "CACHE"
id = "cd8e28bc65ed437ab71e97f3cc43c2ec"
